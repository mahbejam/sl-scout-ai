<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL Scout — Market Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Vazirmatn:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;--surf:#0c0c18;--card:#10101e;--card2:#141428;
  --b1:#1a1a30;--b2:#252540;
  --acc:#6f5fff;--acc2:rgba(111,95,255,0.1);--acc3:rgba(111,95,255,0.2);
  --rose:#ff4f7b;--green:#2ecc71;--amber:#f0a500;--cyan:#00d4ff;
  --tx:#f0f0fa;--sub:#8888a8;--mu:#404060;--r:12px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
body.rtl{direction:rtl;font-family:'Vazirmatn','Inter',sans-serif}
body.ltr{direction:ltr;font-family:'Inter',sans-serif}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(111,95,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(111,95,255,0.025) 1px,transparent 1px);background-size:52px 52px;pointer-events:none;z-index:0}

/* HEADER */
header{height:54px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);background:rgba(6,6,15,0.92);backdrop-filter:blur(20px);position:sticky;top:0;z-index:500}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--tx)}
.logo-mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--rose));display:flex;align-items:center;justify-content:center;font-size:0.68rem;font-weight:800;color:#fff;box-shadow:0 0 16px var(--acc3)}
.logo-name{font-size:.95rem;font-weight:700;letter-spacing:-.4px}
.logo-name span{color:var(--acc)}
.hdr-r{display:flex;align-items:center;gap:10px}
.ai-badge{display:flex;align-items:center;gap:5px;font-size:.65rem;font-weight:600;color:var(--sub)}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:throb 2.5s ease infinite}
@keyframes throb{0%,100%{opacity:1}50%{opacity:.3}}
.lsw{display:flex;gap:1px;padding:3px;background:var(--surf);border:1px solid var(--b1);border-radius:8px}
.lb{padding:4px 8px;border-radius:5px;border:none;background:transparent;color:var(--mu);font-size:.65rem;font-weight:700;letter-spacing:.5px;cursor:pointer;transition:all .15s;font-family:inherit}
.lb.on{background:var(--card2);color:var(--tx);border:1px solid var(--b2)}
.lb:hover:not(.on){color:var(--sub)}

/* MAIN */
main{max-width:820px;margin:0 auto;padding:52px 18px 90px;position:relative;z-index:1}

/* HERO */
.hero{text-align:center;margin-bottom:44px}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--acc2);border:1px solid rgba(111,95,255,.22);color:var(--acc);font-size:.65rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:18px}
.hero h1{font-size:2.5rem;font-weight:800;line-height:1.15;letter-spacing:-1px;margin-bottom:14px}
.hero h1 em{font-style:normal;background:linear-gradient(110deg,var(--acc) 20%,var(--rose) 80%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--sub);font-size:.92rem;max-width:420px;margin:0 auto;line-height:1.8}

/* SHOWCASE STRIP */
.sc-lbl{font-size:.63rem;font-weight:700;color:var(--mu);letter-spacing:.9px;text-transform:uppercase;margin-bottom:11px;display:flex;align-items:center;gap:8px}
.sc-lbl::after{content:'';flex:1;height:1px;background:var(--b1)}
.sc-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:32px;scrollbar-width:none}
.sc-strip::-webkit-scrollbar{display:none}
.sc-chip{
  flex-shrink:0;display:flex;align-items:center;gap:7px;
  background:var(--card);border:1px solid var(--b1);
  border-radius:22px;padding:8px 14px;cursor:pointer;
  transition:border-color .2s,background .2s,transform .15s;
  white-space:nowrap;
}
.sc-chip:hover{border-color:rgba(111,95,255,.4);background:var(--card2);transform:translateY(-1px)}
.sc-chip:active{transform:scale(.97)}
.sc-chip-icon{font-size:1rem}
.sc-chip-info{}
.sc-chip-name{font-size:.75rem;font-weight:700;color:var(--tx);display:block}
.sc-chip-sub{font-size:.62rem;color:var(--mu)}
.sc-chip-badge{font-size:.58rem;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:4px}
.badge-hot{background:rgba(255,79,123,.12);color:var(--rose);border:1px solid rgba(255,79,123,.2)}
.badge-new{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.badge-top{background:rgba(111,95,255,.1);color:var(--acc);border:1px solid rgba(111,95,255,.2)}

/* FORM CARD */
.form-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:22px;margin-bottom:14px;position:relative;overflow:hidden}
.form-card::before{content:'';position:absolute;top:-60px;right:-60px;width:160px;height:160px;background:radial-gradient(circle,var(--acc3) 0%,transparent 65%);pointer-events:none}
.fc-title{font-size:.7rem;font-weight:700;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:16px}

/* PRODUCT INPUT */
.prod-row{display:flex;gap:10px;margin-bottom:18px;align-items:flex-end}
.prod-wrap{flex:1;display:flex;flex-direction:column;gap:6px}
.prod-wrap label{font-size:.68rem;font-weight:600;color:var(--mu);letter-spacing:.4px;text-transform:uppercase}
.prod-input{background:var(--surf);border:1px solid var(--b1);border-radius:9px;padding:11px 13px;color:var(--tx);font-family:inherit;font-size:.88rem;outline:none;transition:border-color .2s,box-shadow .2s;width:100%}
.prod-input::placeholder{color:var(--mu)}
.prod-input:focus{border-color:rgba(111,95,255,.45);box-shadow:0 0 0 3px rgba(111,95,255,.07)}

/* FILTER GROUPS */
.filters{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.fg{display:flex;flex-direction:column;gap:8px}
.fg.full{grid-column:1/-1}
.fg-label{font-size:.65rem;font-weight:700;color:var(--mu);letter-spacing:.5px;text-transform:uppercase}
.chip-row{display:flex;flex-wrap:wrap;gap:5px}
.chip{
  padding:5px 11px;border-radius:20px;border:1px solid var(--b1);
  background:transparent;color:var(--sub);font-family:inherit;
  font-size:.73rem;font-weight:500;cursor:pointer;
  transition:all .15s;
}
.chip:hover{border-color:rgba(111,95,255,.3);color:var(--tx)}
.chip.on{background:var(--acc2);border-color:rgba(111,95,255,.4);color:var(--acc);font-weight:700}
.chip.on.rose{background:rgba(255,79,123,.1);border-color:rgba(255,79,123,.3);color:var(--rose)}
.chip.on.green{background:rgba(46,204,113,.08);border-color:rgba(46,204,113,.25);color:var(--green)}
.chip.on.amber{background:rgba(240,165,0,.08);border-color:rgba(240,165,0,.25);color:var(--amber)}

/* RUN BUTTON */
.btn-main{width:100%;padding:12px;background:linear-gradient(135deg,var(--acc) 0%,#9b55e5 100%);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s,box-shadow .2s;box-shadow:0 4px 20px rgba(111,95,255,.26);letter-spacing:.2px}
.btn-main:hover{opacity:.88;box-shadow:0 6px 28px rgba(111,95,255,.36)}
.btn-main:active{transform:scale(.99)}
.btn-main:disabled{opacity:.35;cursor:not-allowed;box-shadow:none}

/* LOADER */
.loader{display:none;text-align:center;padding:56px 20px}
.loader.on{display:block}
.spin-wrap{width:52px;height:52px;margin:0 auto 18px;position:relative}
.ring{position:absolute;inset:0;border-radius:50%;border:2px solid transparent}
.ring-a{border-top-color:var(--acc);animation:spin 1s linear infinite}
.ring-b{inset:8px;border-top-color:var(--rose);animation:spin 1.5s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-lbl{font-size:.82rem;color:var(--sub);font-weight:500;margin-bottom:3px}
.loader-br{font-size:.65rem;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.steps-list{display:flex;flex-direction:column;gap:5px;max-width:240px;margin:18px auto 0}
.step{display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--mu);opacity:0;transition:opacity .3s}
.step.done{color:var(--green);opacity:1}
.step.on{color:var(--tx);opacity:1}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.step.on .sdot{background:var(--acc);animation:throb 1s infinite}

/* RESULTS */
.results{display:none}
.results.on{display:block}
.res-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.res-hdr h2{font-size:1rem;font-weight:700}
.res-meta{font-size:.7rem;color:var(--mu);margin-top:2px}
.btn-ghost{background:transparent;border:1px solid var(--b2);color:var(--sub);padding:6px 13px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.72rem;transition:all .2s}
.btn-ghost:hover{border-color:var(--acc);color:var(--acc)}

/* SCORES */
.scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.sc{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:16px 14px;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;bottom:-20px;right:-20px;width:70px;height:70px;border-radius:50%;background:radial-gradient(circle,var(--gc,var(--acc3)) 0%,transparent 70%);pointer-events:none}
.sc.g{--gc:rgba(46,204,113,.12)}.sc.a{--gc:rgba(240,165,0,.1)}
.sc-lbl{font-size:.6rem;font-weight:700;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:8px}
.sc-val{font-size:1.85rem;font-weight:800;line-height:1;letter-spacing:-1px;margin-bottom:2px}
.sc-sub{font-size:.62rem;color:var(--mu)}

/* TABS */
.tabs{display:flex;gap:2px;padding:3px;background:var(--surf);border:1px solid var(--b1);border-radius:10px;margin-bottom:12px}
.tb{flex:1;padding:7px 3px;background:transparent;border:none;color:var(--mu);font-family:inherit;font-size:.68rem;border-radius:7px;cursor:pointer;transition:all .18s;white-space:nowrap}
.tb.on{background:var(--card2);color:var(--tx);font-weight:700;border:1px solid var(--b2);box-shadow:0 1px 4px rgba(0,0,0,.3)}
.pnl{display:none}.pnl.on{display:block}

/* DATA CARDS */
.dc{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:20px;margin-bottom:12px}
.dc h3{font-size:.62rem;font-weight:700;color:var(--mu);letter-spacing:.7px;text-transform:uppercase;margin-bottom:16px}

/* TARGET SUMMARY CARD */
.target-card{background:linear-gradient(135deg,rgba(111,95,255,.07),rgba(255,79,123,.04));border:1px solid rgba(111,95,255,.18);border-radius:11px;padding:16px;margin-bottom:12px;display:flex;flex-wrap:wrap;gap:10px}
.target-item{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--sub)}
.target-item strong{color:var(--tx);font-weight:600}
.target-dot{width:4px;height:4px;border-radius:50%;background:var(--acc)}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:7px 11px;font-size:.63rem;color:var(--mu);border-bottom:1px solid var(--b1);font-weight:700;text-align:left;letter-spacing:.4px;text-transform:uppercase}
body.rtl th{text-align:right}
td{padding:11px;font-size:.8rem;border-bottom:1px solid rgba(26,26,48,.7)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.01)}
.td-n{font-weight:600}.td-s{color:var(--sub)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:.65rem;font-weight:700}
.ph{background:rgba(46,204,113,.1);color:var(--green);border:1px solid rgba(46,204,113,.2)}
.pm{background:rgba(240,165,0,.1);color:var(--amber);border:1px solid rgba(240,165,0,.2)}
.pl{background:rgba(255,79,123,.1);color:var(--rose);border:1px solid rgba(255,79,123,.2)}

/* BARS */
.bars{display:flex;flex-direction:column;gap:11px}
.br{display:flex;flex-direction:column;gap:4px}
.bmeta{display:flex;justify-content:space-between;font-size:.76rem}
.bpct{color:var(--sub);font-size:.72rem;font-weight:600}
.track{height:5px;background:var(--surf);border-radius:3px;overflow:hidden;border:1px solid var(--b1)}
.fill{height:100%;border-radius:3px;transition:width 1.1s cubic-bezier(.4,0,.2,1);width:0%}

/* KEYWORDS */
.kws{display:flex;flex-wrap:wrap;gap:6px}
.kw{display:flex;align-items:center;gap:5px;background:var(--acc2);border:1px solid rgba(111,95,255,.16);color:var(--acc);padding:4px 10px;border-radius:20px;font-size:.72rem;cursor:default}
.kw-v{background:rgba(111,95,255,.14);padding:1px 6px;border-radius:8px;font-size:.63rem;font-weight:700}
.kw.g{background:rgba(46,204,113,.07);border-color:rgba(46,204,113,.16);color:var(--green)}
.kw.g .kw-v{background:rgba(46,204,113,.12)}

/* STRATEGY */
.si{border-left:2px solid var(--acc);padding:11px 14px;margin-bottom:9px;background:rgba(111,95,255,.03);border-radius:0 8px 8px 0;transition:background .2s}
body.rtl .si{border-left:none;border-right:2px solid var(--acc);border-radius:8px 0 0 8px}
.si:hover{background:rgba(111,95,255,.06)}
.si h4{font-size:.79rem;font-weight:700;color:var(--acc);margin-bottom:4px}
.si p{font-size:.76rem;color:var(--sub);line-height:1.8}
.raw-out{font-size:.77rem;line-height:2;color:var(--sub);white-space:pre-wrap}

@media(max-width:600px){
  header{padding:0 12px}
  main{padding:32px 12px 80px}
  .hero h1{font-size:1.8rem}
  .filters{grid-template-columns:1fr}
  .scores{grid-template-columns:1fr}
  .tabs{flex-wrap:wrap}
  .tb{font-size:.64rem}
}
</style>
</head>
<body class="ltr">

<header>
  <a class="logo" href="#">
    <div class="logo-mark">SL</div>
    <div class="logo-name">SL <span>Scout</span></div>

    <div class="ai-badge"><div class="ai-dot"></div><span id="aiTxt">AI Online</span></div>
    <div class="lsw" id="lsw"></div>
  </div>
</header>

<main>
  <div class="hero">
    <div class="tag" id="elTag"></div>
    <h1 id="elH1"></h1>
    <p id="elSub"></p>
  </div>

  <!-- SHOWCASE STRIP -->
  <div id="showcaseWrap">
    <div class="sc-lbl" id="scLbl"></div>
    <div class="sc-strip" id="scStrip"></div>
  </div>

  <!-- FORM -->
  <div class="form-card" id="formCard">
    <div class="fc-title" id="fcTitle"></div>

    <!-- Product name -->
    <div class="prod-row">
      <div class="prod-wrap">
        <label id="elLprod"></label>
        <input class="prod-input" id="elProd" type="text"/>
      </div>
    </div>

    <!-- Market / City -->
    <div class="filters">
      <div class="fg">
        <div class="fg-label" id="elLmkt"></div>
        <div class="chip-row" id="mktChips"></div>
      </div>

      <!-- Gender -->
      <div class="fg">
        <div class="fg-label" id="elLgen"></div>
        <div class="chip-row" id="genChips"></div>
      </div>

      <!-- Age -->
      <div class="fg full">
        <div class="fg-label" id="elLage"></div>
        <div class="chip-row" id="ageChips"></div>
      </div>

      <!-- Brand tier -->
      <div class="fg">
        <div class="fg-label" id="elLbrand"></div>
        <div class="chip-row" id="brandChips"></div>
      </div>

      <!-- Channel -->
      <div class="fg">
        <div class="fg-label" id="elLchan"></div>
        <div class="chip-row" id="chanChips"></div>
      </div>
    </div>

    <button class="btn-main" id="elRunBtn" onclick="dsRun()"></button>
  </div>

  <!-- LOADER -->
  <div class="loader" id="elLoader">
    <div class="spin-wrap">
      <div class="ring ring-a"></div>
      <div class="ring ring-b"></div>
    </div>
    <div class="loader-lbl" id="elLoaderLbl"></div>
    <div class="loader-br">SL Scout AI</div>
    <div class="steps-list" id="elSteps"></div>
  </div>

  <!-- RESULTS -->
  <div class="results" id="elResults">
    <div class="res-hdr">
      <div>
        <h2 id="elResTitle"></h2>
        <div class="res-meta" id="elResMeta"></div>
      </div>
      <button class="btn-ghost" id="elResetBtn" onclick="dsReset()"></button>
    </div>

    <!-- Target summary -->
    <div class="target-card" id="targetCard"></div>

    <div class="scores">
      <div class="sc g">
        <div class="sc-lbl" id="elSc1Lbl"></div>
        <div class="sc-val" id="elSc1Val" style="color:var(--green)">—</div>
        <div class="sc-sub">/100</div>
      </div>
      <div class="sc a">
        <div class="sc-lbl" id="elSc2Lbl"></div>
        <div class="sc-val" id="elSc2Val" style="color:var(--amber);font-size:1.1rem;margin-top:6px">—</div>
        <div class="sc-sub" id="elSc2Sub"></div>
      </div>
      <div class="sc">
        <div class="sc-lbl" id="elSc3Lbl"></div>
        <div class="sc-val" id="elSc3Val" style="color:var(--acc);font-size:1.1rem;margin-top:6px">—</div>
        <div class="sc-sub" id="elSc3Sub"></div>
      </div>
    </div>

    <div class="tabs" id="elTabs"></div>

    <div class="pnl on" id="pnl-geo">
      <div class="dc"><h3 id="T_geo"></h3>
        <div class="tbl-wrap"><table><thead><tr id="elTH"></tr></thead><tbody id="elTB"></tbody></table></div>
      </div>
    </div>
    <div class="pnl" id="pnl-age">
      <div class="dc"><h3 id="T_age"></h3><div class="bars" id="elBars"></div></div>
      <div class="dc"><h3 id="T_persona"></h3><p id="elPers" style="font-size:.8rem;line-height:1.9;color:var(--sub)"></p></div>
    </div>
    <div class="pnl" id="pnl-seo">
      <div class="dc"><h3 id="T_kw"></h3><div class="kws" id="elKws"></div></div>
      <div class="dc"><h3 id="T_lt"></h3><div class="kws" id="elLt"></div></div>
    </div>
    <div class="pnl" id="pnl-strat">
      <div class="dc"><h3 id="T_strat"></h3><div id="elStrat"></div></div>
    </div>
    <div class="pnl" id="pnl-raw">
      <div class="dc"><h3 id="T_raw"></h3><div class="raw-out" id="elRaw"></div></div>
    </div>
  </div>
</main>

  document.body.style.fontFamily = t.dir === 'rtl' ? "'Vazirmatn','Inter',sans-serif" : "'Inter',sans-serif";

  document.querySelectorAll('.lb').forEach(function(b){ b.classList.toggle('on', b.dataset.lang === code); });
  document.querySelectorAll('.prod-input').forEach(function(el){ el.style.direction = t.dir; });

  G('elTag').textContent = t.tag;
  G('elH1').innerHTML = t.h1;
  G('elSub').textContent = t.sub;
  G('fcTitle').textContent = t.fcTitle;
  G('elLprod').textContent = t.Lprod;
  G('elProd').placeholder = t.phprod;
  G('elLmkt').textContent = t.Lmkt;
  G('elLgen').textContent = t.Lgen;
  G('elLage').textContent = t.Lage;
  G('elLbrand').textContent = t.Lbrand;
  G('elLchan').textContent = t.Lchan;
  G('elRunBtn').textContent = t.run;
  G('elLoaderLbl').textContent = t.loaderLbl;
  G('scLbl').textContent = t.scLbl;
  G('elResTitle').textContent = t.resTitle;
  G('elResetBtn').textContent = t.resetBtn;
  G('elSc1Lbl').textContent = t.sc1;
  G('elSc2Lbl').textContent = t.sc2;
  G('elSc3Lbl').textContent = t.sc3;
  G('elSc2Sub').textContent = t.sc2s;
  G('elSc3Sub').textContent = t.sc3s;
  G('T_geo').textContent = t.T_geo;
  G('T_age').textContent = t.T_age;
  G('T_persona').textContent = t.T_persona;
  G('T_kw').textContent = t.T_kw;
  G('T_lt').textContent = t.T_lt;
  G('T_strat').textContent = t.T_strat;
  G('T_raw').textContent = t.T_raw;

  G('elTabs').innerHTML = t.tabs.map(function(lbl,i){
    return '<button class="tb'+(i===0?' on':'')+'" onclick="showTab(\''+TABS_KEYS[i]+'\')">'+lbl+'</button>';
  }).join('');

  G('elSteps').innerHTML = t.steps.map(function(s,i){
    return '<div class="step" id="st'+(i+1)+'"><div class="sdot"></div>'+s+'</div>';
  }).join('');

  buildChips('mktChips', t.mkt, 'mkt', '');
  buildChips('genChips', t.gen, 'gen', 'rose');
  buildChips('ageChips', t.age, 'age', 'amber');
  buildChips('brandChips', t.brand, 'brand', 'green');
  buildChips('chanChips', t.chan, 'chan', '');

  refreshTH();
  buildShowcase();
}

function buildChips(containerId, items, key, color) {
  var html = '';
  for(var i=0;i<items.length;i++){
    var on = sel[key]===i?' on':'';
    var cls = color ? (' '+(on?color:'')) : '';
    html += '<button class="chip'+on+cls+'" onclick="pickChip(\''+key+'\','+i+',this)">'+items[i]+'</button>';
  }
  G(containerId).innerHTML = html;
}

function pickChip(key, idx, el) {
  sel[key] = idx;
  var container = el.parentElement;
  container.querySelectorAll('.chip').forEach(function(c,i){
    c.classList.toggle('on', i===idx);
    // keep color class
    ['rose','green','amber'].forEach(function(cl){
      if(c.classList.contains(cl)){ c.classList.remove(cl); }
    });
    if(i===idx){
      var colorMap = {gen:'rose',age:'amber',brand:'green'};
      if(colorMap[key]) c.classList.add(colorMap[key]);
    }
  });
}

function buildSwitcher() {
  G('lsw').innerHTML = Object.keys(T).map(function(k){
    return '<button class="lb" data-lang="'+k+'" onclick="setLang(\''+k+'\')">'+T[k].lbl+'</button>';
  }).join('');
}

function refreshTH() {
  var h = G('elTH');
  if(!h) return;
  h.innerHTML = T[curLang].th.map(function(c){ return '<th>'+c+'</th>'; }).join('');
}

function buildShowcase() {
  var bmap = {hot:'badge-hot',new:'badge-new',top:'badge-top'};
  G('scStrip').innerHTML = SHOWCASE.map(function(s,i){
    return '<div class="sc-chip" onclick="loadExample('+i+')">'+
      '<div class="sc-chip-icon">'+s.icon+'</div>'+
      '<div class="sc-chip-info">'+
        '<span class="sc-chip-name">'+s.name+'<span class="sc-chip-badge '+bmap[s.badge]+'">'+s.badge.toUpperCase()+'</span></span>'+
        '<span class="sc-chip-sub">'+s.sub+'</span>'+
      '</div>'+
    '</div>';
  }).join('');
}

function loadExample(idx) {
  var s = SHOWCASE[idx];
  G('elProd').value = s.prod;
  // set selections directly by index
  sel.mkt   = s.mkt;
  sel.gen   = s.gen;
  sel.age   = s.age;
  sel.brand = s.brand;
  sel.chan  = s.chan;
  // rebuild chips to reflect new selections
  var t = T[curLang];
  buildChips('mktChips',   t.mkt,   'mkt',   '');
  buildChips('genChips',   t.gen,   'gen',   'rose');
  buildChips('ageChips',   t.age,   'age',   'amber');
  buildChips('brandChips', t.brand, 'brand', 'green');
  buildChips('chanChips',  t.chan,  'chan',  '');
  G('formCard').scrollIntoView({behavior:'smooth', block:'center'});
  setTimeout(function(){ dsRun(); }, 450);
}

// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function showTab(name) {
  document.querySelectorAll('.tb').forEach(function(b,i){ b.classList.toggle('on', TABS_KEYS[i]===name); });
  document.querySelectorAll('.pnl').forEach(function(p){ p.classList.remove('on'); });
  G('pnl-'+name).classList.add('on');
}

// ═══════════════════════════════════════════
// RUN
// ═══════════════════════════════════════════
async function dsRun() {
  var prod = G('elProd').value.trim();
  if(!prod){ G('elProd').focus(); return; }
  var t = T[curLang];

  G('elRunBtn').disabled = true;
  G('formCard').style.opacity = '.3';
  G('formCard').style.pointerEvents = 'none';
  G('elLoader').classList.add('on');

  for(var i=0;i<t.steps.length;i++){
    if(i>0){ var prev=G('st'+i); if(prev) prev.classList.replace('on','done'); }
    var cur=G('st'+(i+1)); if(cur) cur.classList.add('on');
    await wait(750);
  }
  var last=G('st'+t.steps.length); if(last) last.classList.replace('on','done');
  await wait(280);
  G('elLoader').classList.remove('on');
  render(buildData(prod, t), t, prod);
}

// ═══════════════════════════════════════════
// DATA ENGINE
// ═══════════════════════════════════════════
function buildData(prod, t) {
  var p = prod.toLowerCase();
  var mktName = t.mkt[sel.mkt];
  var genName = t.gen[sel.gen];
  var ageName = t.age[sel.age];
  var brandName = t.brand[sel.brand];
  var chanName = t.chan[sel.chan];

  // detect category
  var cat = 'general';
  if(/coffee|kaffee|food|قهوه|غذا|oil|روغن|آرد|rice|bread|snack|drink|organic/.test(p)) cat='food';
  else if(/shoe|schuhe|كفش|کفش|fashion|mode|پوشاک|dress|shirt|kleid|bag|tasche/.test(p)) cat='fashion';
  else if(/phone|laptop|tablet|elektronik|الکترونیک|camera|watch|earbuds|speaker|tv/.test(p)) cat='electronics';
  else if(/lipstick|cream|كرم|کرم|beauty|kosmetik|آرایش|shampoo|serum|makeup|vitamin|supplement/.test(p)) cat='beauty';
  else if(/gym|sport|fitness|yoga|protein|supplement|equipment/.test(p)) cat='sports';
  else if(/smart home|iot|device|software|app|saas/.test(p)) cat='tech';

  // score modifiers by brand tier
  var brandMod = [0,-5,0,8,14];
  var baseScore = {food:82,fashion:78,electronics:71,beauty:85,sports:74,tech:76,general:68}[cat];
  var demandScore = Math.min(96, baseScore + brandMod[sel.brand] + (sel.age>0?3:0));

  // pick cities
  var pool = CITIES[mktName] || CITIES['International'];
  var levels = ['high','high','medium','medium','medium','low'];
  var cities = pool.map(function(c,i){
    // gender/age modifier on volume
    var gMod = sel.gen===1?1.12:sel.gen===2?0.95:1.0;
    var aMod = sel.age>=2&&sel.age<=4?1.15:sel.age===5?0.85:1.0;
    var vol = Math.round(c.b * gMod * aMod * (0.88+Math.random()*0.24));
    var vs = vol>=1000?(vol/1000).toFixed(1).replace('.0','')+'K':vol+'';
    return {name:c.n, population:c.p, monthlySearches:vs, demand:levels[i]};
  });

  // age groups — shift based on selection
  var ageBase = [
    {r:'13–17',p:8},{r:'18–24',p:22},{r:'25–34',p:32},{r:'35–44',p:22},{r:'45–54',p:12},{r:'55+',p:4}
  ];
  if(sel.age>0&&sel.age<7){
    // boost selected age
    var boost = sel.age-1;
    ageBase = ageBase.map(function(a,i){
      return {r:a.r, p: i===boost ? Math.min(55,a.p+20) : Math.max(2,Math.round(a.p*0.72))};
    });
  }
  if(sel.gen===1){ ageBase[0].p=Math.round(ageBase[0].p*1.3); ageBase[2].p=Math.round(ageBase[2].p*1.2); }
  if(sel.gen===2){ ageBase[2].p=Math.round(ageBase[2].p*1.15); ageBase[3].p=Math.round(ageBase[3].p*1.1); }
  // normalize to 100
  var total = ageBase.reduce(function(s,a){return s+a.p;},0);
  ageBase = ageBase.map(function(a){return {r:a.r, p:Math.round(a.p/total*100)};});

  // keywords
  var kwVols = ['28K','21K','16K','11K','8K','6K','4K','3K'];
  var ltVols = ['1.8K','1.2K','940','720','510','340'];
  var kwPrefixes = {
    en:['buy','best','cheap','review',prod+' for','premium',prod+' near','discount'],
    de:['kaufen','bestes','günstig','Bewertung',prod+' für','Premium',prod+' Wien','Angebot'],
    fa:['خرید','بهترین','ارزان','بررسی',prod+' برای','پریمیوم',prod+' تهران','تخفیف'],
    ar:['شراء','أفضل','رخيص','مراجعة',prod+' لـ','مميز',prod+' دبي','خصم'],
    tr:['satın al','en iyi','ucuz','inceleme',prod+' için','premium',prod+' İstanbul','indirim']
  };
  var ltPfx = {
    en:['for '+genName.toLowerCase(),(ageName!=='All'?'age '+ageName:'online'),'direct from brand','with free shipping','in '+mktName,'vs competitors'],
    de:['für '+(genName==='Alle'?'alle':genName.toLowerCase()),(ageName!=='Alle'?ageName+' Jahre':'online'),'direkt vom Hersteller','kostenloser Versand','in '+mktName,'vs Konkurrenz'],
    fa:['برای '+(genName==='همه'?'همه':genName),(ageName!=='همه'?ageName+' سال':'آنلاین'),'مستقیم از برند','ارسال رایگان','در '+mktName,'در مقابل رقبا'],
    ar:['لـ '+genName,(ageName!=='الكل'?'سن '+ageName:'إلكتروني'),'مباشرة من العلامة','شحن مجاني','في '+mktName,'مقابل المنافسين'],
    tr:[genName.toLowerCase()+' için',(ageName!=='Tümü'?ageName+' yaş':'online'),'markadan direkt','ücretsiz kargo',mktName+'\'da','rakipler vs']
  };
  var pfxArr = kwPrefixes[curLang] || kwPrefixes.en;
  var ltArr  = ltPfx[curLang]     || ltPfx.en;
  var keywords = pfxArr.map(function(pf,i){return {word:pf+' '+prod, volume:kwVols[i]||'1K'};});
  var longTail = ltArr.map(function(sf,i){return {word:prod+' '+sf, volume:ltVols[i]||'200'};});

  // strategies (English base, translated key phrases)
  var strats_en = [
    {t:'Search & SEO ('+(chanName==='Online'||chanName==='Both'||chanName==='Alle'||chanName==='كلاهما'?'✓ your channel':'consider adding online')+')',
     d:'Target "'+(pfxArr[0]||'buy')+' '+prod+'" in '+mktName+'. Average CPC in this category: €0.40–€1.80. Focus on the top 2 cities first — Wien and Graz if Austria, London and Manchester if UK.'},
    {t:'Social Media for '+(genName==='All'||genName==='Alle'||genName==='همه'?'broad audience':genName),
     d:'The '+ageName+' '+(genName==='Women'||genName==='Frauen'||genName==='زنان'?'female':'')+(genName==='Men'||genName==='Männer'||genName==='مردان'?'male':'')+' segment is most active on '+(sel.age<=3?'TikTok and Instagram':'Facebook and YouTube')+'. 4 posts/week in real-use context outperform polished ads 3:1.'},
    {t:(brandName==='Premium'||brandName==='Luxury'||brandName==='Lüks'||brandName==='لاکچری'?'Premium Positioning':'Competitive Pricing'),
     d:(brandName==='Premium'||brandName==='Luxury'?'At premium/luxury tier, do not compete on price. Lead with craftsmanship, heritage, and exclusivity. Limit distribution to preserve brand equity.':'Price transparency wins in mid-range. Clear value comparison vs competitors at the point of purchase reduces cart abandonment by 28%.') },
    {t:'Channel: '+(chanName||'Multi-channel'),
     d:(sel.chan===0||sel.chan===3?'Multi-channel approach: list online for 24/7 demand capture AND maintain retail presence for tactile discovery. Studies show 40% of online purchases are preceded by a physical touchpoint.':sel.chan===1?'Online-first: invest in product photography (8 images minimum), 20+ reviews in month 1, and accurate SEO metadata. This alone drives 60% of discoverability.':'Retail presence requires strong visual merchandising and trained staff who understand the product deeply. Consider a launch event in your top city.')}
  ];

  // persona
  var personaGender = sel.gen===1?'female':sel.gen===2?'male':'';
  var personaAge = sel.age>0&&sel.age<7?T[curLang].age[sel.age]:'26–44';
  var persona_en = 'Ideal buyer: '+personaAge+' '+personaGender+', '+mktName+', '+brandName.toLowerCase()+' segment. They research '+(sel.age<=3?'on social media and YouTube':'through review sites and word of mouth')+' before purchasing. '+(sel.chan===1||sel.chan===3?'Comfortable buying online.':'Prefer seeing the product in person first.')+' Brand authenticity and reviews matter more than advertising to this group.';

  var persona = persona_en;
  if(curLang==='fa') persona = 'مشتری ایده‌آل: '+personaAge+' ساله، '+mktName+'، سطح '+brandName+'. قبل از خرید در '+(sel.age<=3?'شبکه‌های اجتماعی':'سایت‌های بررسی')+' تحقیق می‌کند. اعتبار برند و نظرات مشتریان برای این گروه مهم‌تر از تبلیغات است.';
  if(curLang==='de') persona = 'Idealer Käufer: '+personaAge+', '+mktName+', '+brandName+'-Segment. Recherchiert vor dem Kauf '+(sel.age<=3?'auf Social Media':'auf Bewertungsportalen')+'. Markenvertrauen ist für diese Gruppe wichtiger als Werbung.';
  if(curLang==='ar') persona = 'المشتري المثالي: '+personaAge+' سنة، '+mktName+'. يبحث قبل الشراء '+(sel.age<=3?'على وسائل التواصل الاجتماعي':'على مواقع المراجعات')+'. الأصالة والمراجعات أهم من الإعلانات.';

  var analysis_en = prod+' — Market Assessment\n\n';
  analysis_en += 'Target: '+ageName+' '+genName+', '+mktName+', '+brandName+' segment, '+chanName+' channel.\n\n';
  analysis_en += 'Demand is real. Monthly search volume in '+mktName+' sits at roughly '+(cities[0]?cities[0].monthlySearches:'40K')+' queries in the lead city alone. The '+ageName+' cohort drives the bulk of purchase intent.\n\n';
  analysis_en += (sel.brand>=3?'At the premium end, the market is less price-sensitive but highly trust-sensitive. One bad review can cost 12 potential customers. Invest in excellence, not discounts.':'Competition is present but the market is not saturated. First-mover advantage still exists in this segment.')+'\n\n';
  analysis_en += 'Priority actions: '+(sel.chan===1||sel.chan===3?'build a conversion-optimized product page first.':'secure a strong retail location in '+(cities[0]?cities[0].name:'the capital city')+' first.')+' Then scale to secondary cities once unit economics are confirmed.';

  return {
    demandScore: demandScore,
    competitionLevel: t.compL[1],
    growthOpportunity: t.oppL[sel.brand>=3?2:1],
    cities: cities,
    ageGroups: ageBase,
    persona: persona,
    keywords: keywords,
    longTailKeywords: longTail,
    strategies: strats_en,
    fullAnalysis: analysis_en,
    // meta for display
    _mkt: mktName, _gen: genName, _age: ageName, _brand: brandName, _chan: chanName
  };
}

// ═══════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════
function render(d, t, prod) {
  // target summary
  var items = [
    {icon:'📦',label:prod},
    {icon:'🌍',label:d._mkt},
    {icon:'👤',label:d._gen},
    {icon:'🎂',label:d._age},
    {icon:'✨',label:d._brand},
    {icon:'🛒',label:d._chan}
  ];
  G('targetCard').innerHTML = items.map(function(it){
    return '<div class="target-item"><div class="target-dot"></div><strong>'+it.icon+' '+it.label+'</strong></div>';
  }).join('');
  G('elResMeta').textContent = new Date().toLocaleDateString(curLang==='fa'?'fa-IR':curLang==='ar'?'ar':'de-AT',{year:'numeric',month:'long',day:'numeric'});

  countUp('elSc1Val', d.demandScore);
  G('elSc2Val').textContent = d.competitionLevel;
  G('elSc3Val').textContent = d.growthOpportunity;

  refreshTH();
  G('elTB').innerHTML = (d.cities||[]).map(function(c){
    var pc=c.demand==='high'?'ph':c.demand==='medium'?'pm':'pl';
    var lbl=c.demand==='high'?t.dH:c.demand==='medium'?t.dM:t.dL;
    return '<tr><td class="td-n">'+c.name+'</td><td class="td-s">'+c.population+'</td><td class="td-s">'+c.monthlySearches+'</td><td><span class="pill '+pc+'">'+lbl+'</span></td></tr>';
  }).join('');

  G('elBars').innerHTML = (d.ageGroups||[]).map(function(a,i){
    return '<div class="br"><div class="bmeta"><span>'+a.r+'</span><span class="bpct">'+a.p+'%</span></div><div class="track"><div class="fill" id="bf'+i+'" style="background:'+COLS[i%COLS.length]+'"></div></div></div>';
  }).join('');
  setTimeout(function(){
    (d.ageGroups||[]).forEach(function(_,i){var e=G('bf'+i);if(e)e.style.width=d.ageGroups[i].p+'%';});
  },80);

  G('elPers').textContent = d.persona||'';
  G('elKws').innerHTML=(d.keywords||[]).map(function(k){return '<div class="kw">'+k.word+'<span class="kw-v">'+k.volume+'</span></div>';}).join('');
  G('elLt').innerHTML=(d.longTailKeywords||[]).map(function(k){return '<div class="kw g">'+k.word+'<span class="kw-v">'+k.volume+'</span></div>';}).join('');
  G('elStrat').innerHTML=(d.strategies||[]).map(function(s){return '<div class="si"><h4>'+s.t+'</h4><p>'+s.d+'</p></div>';}).join('');
  G('elRaw').textContent = d.fullAnalysis||'';

  G('elResults').classList.add('on');
  G('elResults').scrollIntoView({behavior:'smooth'});
}

function countUp(id,target){
  var el=G(id);var n=0;
  var iv=setInterval(function(){n=Math.min(n+Math.ceil(target/40),target);el.textContent=n;if(n>=target)clearInterval(iv);},28);
}

function dsReset(){
  G('elRunBtn').disabled=false;
  G('formCard').style.opacity='1';
  G('formCard').style.pointerEvents='auto';
  G('elResults').classList.remove('on');
  G('elLoader').classList.remove('on');
  setLang(curLang);
  window.scrollTo({top:0,behavior:'smooth'});
}

// BOOT
buildSwitcher();
setLang('en');
</script>
